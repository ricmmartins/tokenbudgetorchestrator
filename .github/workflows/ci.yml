name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  python-sdk:
    name: Python SDK
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: sdks/python
        run: pip install -e ".[dev]"

      - name: Lint
        working-directory: sdks/python
        run: ruff check src/

      - name: Test
        working-directory: sdks/python
        run: pytest tests/ -v --tb=short

  node-sdk:
    name: Node.js SDK
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["18", "20", "22"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        working-directory: sdks/node
        run: npm ci

      - name: Type check
        working-directory: sdks/node
        run: npx tsc --noEmit

      - name: Test
        working-directory: sdks/node
        run: npx vitest run

  engine:
    name: Engine
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: engine
        run: pip install -e ".[dev]"

      - name: Verify imports
        working-directory: engine
        run: |
          PYTHONPATH=src python -c "from engine.main import app; print(f'OK: {len(app.routes)} routes')"
          PYTHONPATH=src python -c "from engine.budget_store import RedisBudgetStore; print('OK: budget_store')"

      - name: Build Docker image
        run: docker build -t tbo-engine ./engine
